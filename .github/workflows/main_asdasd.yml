name: Build and deploy Python project to Azure Function App - asdasd

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.'
  PYTHON_VERSION: '3.14'   # <-- MUST be 3.14 — the only version this Flex app's Oryx builder supports

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 'Deploy to Azure Functions (remote build installs deps on Azure)'
        uses: Azure/functions-action@v1
        id: deploy-to-function
        with:
          app-name: 'asdasd'
          slot-name: 'Production'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_1257928670FF43C8AE4EFAEA654076AA }}
          sku: 'flexconsumption'
          remote-build: true
