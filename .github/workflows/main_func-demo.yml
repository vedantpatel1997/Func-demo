# https://github.com/Azure/functions-action?utm_source=chatgpt.com#parameter-reference
# https://learn.microsoft.com/en-us/azure/azure-functions/functions-how-to-github-actions?utm_source=chatgpt.com&tabs=linux%2Cpython&pivots=method-template#example-workflow-configuration-file

name: Build and deploy Python project to Azure Function App - Func-demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-func-demo-production
  cancel-in-progress: false

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.'   # path to the function project (repo root)
  PYTHON_VERSION: '3.13'                # MUST match the Function App runtime (python 3.13)
  AZURE_FUNCTIONAPP_NAME: 'Func-demo'   # set this to your function app name on Azure
  
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read   # required for actions/checkout

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v3
      
      - name: Setup Python ${{ env.PYTHON_VERSION }} Environment
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
  
      - name: 'Resolve Project Dependencies Using Pip'
        shell: bash
        run: |
          pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          python -m pip install --upgrade pip
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"
          popd
  
      - name: 'Run Azure Functions Action'
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_5A43E5BCCA7245779EACA83912784B91 }}
          sku: 'flexconsumption'
          remote-build: true          # Oryx installs requirements.txt on the platform
          respect-funcignore: true    # honor .funcignore so tests/venv are not shipped
  
      
