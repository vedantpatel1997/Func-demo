# Build and deploy a Python Azure Functions app (Flex Consumption plan).
#
# Docs:
#   - functions-action: https://github.com/Azure/functions-action
#   - Flex Consumption + GitHub Actions: https://aka.ms/python-webapps-actions
#
# IMPORTANT (why this workflow looks the way it does):
#   Func-demo runs on the *Flex Consumption* plan. On Flex Consumption the
#   platform builds your dependencies remotely with Oryx (`remote-build: true`).
#   We therefore DO NOT build a virtual environment or vendor packages in CI.
#   We just run the tests, then hand the source to Azure, which runs
#   `pip install -r requirements.txt` into /home/site/wwwroot/.python_packages
#   during deployment. This is what fixes the previous
#   "ModuleNotFoundError: No module named 'azure.communication'" failure.

name: Build and deploy Python project to Azure Function App - Func-demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Serialize deployments so two runs never deploy at the same time.
# (Overlapping deploys cause "another deployment is in progress" on Flex Consumption.)
# cancel-in-progress: false -> queue runs instead of cancelling an in-flight deploy.
concurrency:
  group: deploy-func-demo-production
  cancel-in-progress: false

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.'   # path to the function project (repo root)
  PYTHON_VERSION: '3.13'                # MUST match the Function App runtime (python 3.13)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read   # required for actions/checkout

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # - name: Install dependencies and run tests
      #   # These installs are only for running the test suite on the runner.
      #   # They are NOT what gets deployed — Azure installs runtime deps remotely.
      #   # requirements-dev.txt already pulls in requirements.txt (via `-r`).
      #   run: |
      #     python -m pip install --upgrade pip
      #     pip install -r requirements-dev.txt
      #     python -c "import function_app; print('function_app imported OK')"
      #     python -m pytest -q

      - name: 'Deploy to Azure Functions (Flex Consumption, remote build)'
        uses: Azure/functions-action@v1
        id: deploy-to-function
        with:
          app-name: 'Func-demo'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_5A43E5BCCA7245779EACA83912784B91 }}
          sku: 'flexconsumption'
          remote-build: true          # Oryx installs requirements.txt on the platform
          respect-funcignore: true    # honor .funcignore so tests/venv are not shipped
