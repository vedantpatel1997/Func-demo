# Build-and-ship deployment for a Python Azure Functions app (Flex Consumption).
#
# STRATEGY: dependencies are built in CI (GitHub Actions), NOT on the Function App.
# We vendor the runtime packages into .python_packages/lib/site-packages on the
# Linux runner, then deploy a ready-to-run package with the platform build DISABLED
# (remote-build: false). The Function App runs the package as-is and builds nothing.
#
# Why this is safe: the runner is Linux x86_64 with the SAME Python (3.13) as the
# Function App, so pip downloads Linux (manylinux) wheels that run on the platform.
# PYTHON_VERSION MUST stay equal to the Function App runtime version.
#
# Docs:
#   - functions-action parameters: https://github.com/Azure/functions-action#parameter-reference
#   - GitHub Actions for Functions:  https://learn.microsoft.com/azure/azure-functions/functions-how-to-github-actions

name: Build and deploy Python project to Azure Function App - Func-demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Serialize deploys so two runs never deploy at once ("another deployment in progress").
concurrency:
  group: deploy-func-demo-production
  cancel-in-progress: false

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.'   # path to the function project (repo root)
  PYTHON_VERSION: '3.13'                # MUST match the Function App runtime (python 3.13)
  AZURE_FUNCTIONAPP_NAME: 'Func-demo'   # function app name on Azure

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read   # required for actions/checkout

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Build the deployment artifact IN CI: install runtime deps into the exact
      # folder the Functions Python worker loads from. This makes the package
      # self-contained so the platform does not need to build anything.
      - name: Build dependencies into .python_packages (build in CI)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install --target=".python_packages/lib/site-packages" -r requirements.txt

      # Smoke-test the artifact we are about to ship: import the app using ONLY the
      # vendored packages. If a dependency is missing/incompatible, fail here rather
      # than after deployment. (This is the same import that crashed the host before.)
      - name: Smoke-test the built package
        shell: bash
        run: |
          PYTHONPATH=".python_packages/lib/site-packages" python -c "import function_app; print('built package imports OK')"

      - name: 'Deploy to Azure Functions (pre-built package, no remote build)'
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_5A43E5BCCA7245779EACA83912784B91 }}
          sku: 'flexconsumption'
          remote-build: false          # build happens in CI (above), NOT on the platform
          respect-funcignore: true     # honor .funcignore (do not ship tests/docs/venv)
